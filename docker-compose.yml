# NOTE: This docker-compose.yml is for local development only.
# In production, use environment variables or Docker secrets for credentials.

services:
  db:
    image: postgres:15
    container_name: poe_profiter_db
    environment:
      POSTGRES_USER: poe_user
      POSTGRES_PASSWORD: poe_password
      POSTGRES_DB: poe_profiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poe_user -d poe_profiter"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: poe_profiter_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/poe_profiter:/app

  backend:
    build: ./backend
    container_name: poe_profiter_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://poe_user:poe_password@db:5432/poe_profiter
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

volumes:
  postgres_data:
