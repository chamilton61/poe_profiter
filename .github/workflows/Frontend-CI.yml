name: Frontend CI

on:
  pull_request: 
    branches:
      - main
    types: 
      - opened
      - synchronize
      - closed
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  frontend-checks:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend/poe_profiter
    strategy:
      fail-fast: false
      matrix:
        command:
          - format:check
          - type-check
          - lint
          - test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/poe_profiter/package-lock.json

      - run: npm ci
      - run: npm run ${{ matrix.command }}
  
  build-preview:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs: frontend-checks
    defaults:
      run:
        working-directory: frontend/poe_profiter
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/poe_profiter/package-lock.json

      - run: npm ci      
      - run: npm run build

      - name: Deploy PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/poe_profiter/dist
          destination_dir: pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.issue.number}/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${url}`
            });

  close-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - run: rm -rf gh-pages/pr-${{ github.event.pull_request.number }}
    
    
