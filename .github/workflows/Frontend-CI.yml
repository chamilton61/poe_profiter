name: Frontend CI

on:
  pull_request: 
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  frontend-checks:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend/poe_profiter

    strategy:
      fail-fast: false
      matrix:
        command:
          - format:check
          - type-check
          - lint
          - test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/poe_profiter/package-lock.json

      - run: npm ci
      - run: npm run ${{ matrix.command }}
